<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Record Management System - Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

.login-box{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#388E3C;
}

.info{
    margin-top:20px;
    font-size:14px;
    color:#555;
    text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Student Record Management System</h2>

<form action="/login" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Enter Admin Username or Student Roll Number"
        required>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

    <button type="submit">Login</button>

</form>

<div class="info">
<b>Admin:</b> Username = admin<br>
<b>Students:</b> Username = Roll Number
</div>

</div>

</body>
</html>
