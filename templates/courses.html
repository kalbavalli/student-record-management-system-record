<!DOCTYPE html>
<html>
<head>
    <title>Course Management</title>
</head>
<body>

<h2>Course Management</h2>

<form action="/add_course" method="POST">

    <input type="text" name="course_name" placeholder="Course Name" required><br><br>

    <input type="text" name="course_code" placeholder="Course Code" required><br><br>

    <input type="text" name="department" placeholder="Department" required><br><br>

    <input type="number" name="semester" placeholder="Semester" required><br><br>

    <button type="submit">Add Course</button>

</form>

<hr>

<table border="1">
<tr>
    <th>ID</th>
    <th>Course Name</th>
    <th>Course Code</th>
    <th>Department</th>
    <th>Semester</th>
</tr>

{% for course in courses %}
<tr>
    <td>{{ course[0] }}</td>
    <td>{{ course[1] }}</td>
    <td>{{ course[2] }}</td>
    <td>{{ course[3] }}</td>
    <td>{{ course[4] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">Back</a>

</body>
</html>
