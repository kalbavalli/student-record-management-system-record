<!DOCTYPE html>
<html>
<head>
    <title>Exam Management</title>
</head>
<body>

<h1>Exam Management</h1>

<form action="/add_exam" method="POST">

    <input type="text" name="exam_name" placeholder="Exam Name" required><br><br>

    <input type="text" name="subject" placeholder="Subject" required><br><br>

    <input type="date" name="exam_date" required><br><br>

    <input type="number" name="semester" placeholder="Semester" required><br><br>

    <button type="submit">Add Exam</button>

</form>

<hr>

<table border="1">

<tr>
    <th>ID</th>
    <th>Exam</th>
    <th>Subject</th>
    <th>Date</th>
    <th>Semester</th>
</tr>

{% for exam in exams %}
<tr>
    <td>{{ exam[0] }}</td>
    <td>{{ exam[1] }}</td>
    <td>{{ exam[2] }}</td>
    <td>{{ exam[3] }}</td>
    <td>{{ exam[4] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
